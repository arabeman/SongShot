<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="fonts.css"><link rel="stylesheet" href="style.css">
<style>
  /* Feature-graphic cover — 1024x500, brand lockup + app icon. */
  html, body { width: 1024px; height: 500px; }
  body {
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 74px;
    overflow: hidden;
  }

  /* the app icon, rebuilt from Icon-1024: white tile, ink dot, wave bars */
  .icon {
    flex: none;
    width: 260px; height: 260px;
    background: #FFFFFF;
    border-radius: 60px;
    box-shadow: 0 26px 60px rgba(60, 70, 75, 0.24);
    position: relative;
  }
  .icon .dot {
    position: absolute; left: 60px; top: 58px;
    width: 46px; height: 46px; border-radius: 999px; background: #3C464B;
  }
  .icon .bars {
    position: absolute; left: 0; right: 0; bottom: 52px;
    display: flex; align-items: flex-end; justify-content: center; gap: 14px; height: 128px;
  }
  .icon .bars i { display: block; width: 22px; border-radius: 11px; background: #3C464B; }
  .icon .bars i:nth-child(1) { height: 38%; }
  .icon .bars i:nth-child(2) { height: 72%; }
  .icon .bars i:nth-child(3) { height: 100%; }
  .icon .bars i:nth-child(4) { height: 55%; }
  .icon .bars i:nth-child(5) { height: 82%; }

  /* wordmark + tagline block */
  .block { display: flex; flex-direction: column; align-items: flex-start; gap: 20px; }
  .wordmark { font-size: 96px; line-height: 1; letter-spacing: -2px; }
  .tag {
    font-family: 'Bricolage', sans-serif; font-weight: 600;
    font-size: 40px; color: #3C464B; letter-spacing: -0.5px;
  }
  .sub { font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 27px; color: #595E5E; }
</style>
</head><body>

  <div class="icon">
    <div class="dot"></div>
    <div class="bars"><i></i><i></i><i></i><i></i><i></i></div>
  </div>

  <div class="block">
    <div class="wordmark">SongShot</div>
    <div class="tag">Every shot has a soundtrack</div>
    <div class="sub">One picture, one song — a video ready to share</div>
  </div>

  <!-- floating ink notes on the sky -->
  <svg class="spark" style="left:70px; top:70px" width="42" height="42" viewBox="0 0 40 40" fill="none" stroke="#3C464B" stroke-width="3" stroke-linecap="round">
    <circle cx="13" cy="29" r="4.6"/><path d="M17.6 28 L18 12 C 23 13, 27 15, 28 19"/>
  </svg>
  <svg class="spark" style="right:90px; top:90px" width="38" height="38" viewBox="0 0 40 40" fill="none" stroke="#3C464B" stroke-width="3.6" stroke-linecap="round">
    <path d="M20 4 C 21 12, 22 14, 20 20 C 19 26, 20 30, 20 36 M4 20 C 12 19, 14 18, 20 20 C 26 21, 30 20, 36 20"/>
  </svg>
  <svg class="spark" style="left:110px; bottom:64px" width="34" height="34" viewBox="0 0 40 40" fill="none" stroke="#3C464B" stroke-width="3.6" stroke-linecap="round">
    <path d="M20 4 C 21 12, 22 14, 20 20 C 19 26, 20 30, 20 36 M4 20 C 12 19, 14 18, 20 20 C 26 21, 30 20, 36 20"/>
  </svg>
  <svg class="spark" style="right:120px; bottom:74px" width="40" height="40" viewBox="0 0 44 44" fill="none" stroke="#3C464B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="11" cy="33" rx="5" ry="3.8" transform="rotate(-14 11 33)"/>
    <ellipse cx="29" cy="36" rx="5" ry="3.8" transform="rotate(-14 29 36)"/>
    <path d="M16 31.5 L16.5 12 L34.5 15 L34 34.5 M16.5 17 L34.4 20"/>
  </svg>

</body></html>
