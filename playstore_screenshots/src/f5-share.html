<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="fonts.css"><link rel="stylesheet" href="style.css">
</head><body>

  <div class="top">
    <!-- hand-drawn paper plane -->
    <div class="doodle">
      <svg viewBox="0 0 130 120" fill="none" stroke="#3C464B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 58 C 44 46, 76 34, 110 24 C 100 50, 92 74, 82 96 C 72 84, 62 74, 48 68 Z"/>
        <path d="M48 68 C 47 78, 47 84, 48 92 C 53 86, 56 82, 60 78"/>
        <path d="M110 24 C 88 40, 70 54, 48 68" stroke-width="4"/>
      </svg>
    </div>
    <h1>Ready to post anywhere</h1>
    <svg class="spark" style="left:-46px; top:180px" width="46" height="46" viewBox="0 0 40 40" fill="none" stroke="#3C464B" stroke-width="4" stroke-linecap="round">
      <path d="M20 4 C 21 12, 22 14, 20 20 C 19 26, 20 30, 20 36 M4 20 C 12 19, 14 18, 20 20 C 26 21, 30 20, 36 20"/>
    </svg>
  </div>

  <div class="phone"><div class="screen">
    <div class="nav">
      <div class="backbtn">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#3C464B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 L8 12 L15 19"/></svg>
      </div>
    </div>
    <div class="mtitle">Ready to share</div>

    <!-- the finished video -->
    <div class="card" style="background:#3C464B; position:relative; width:590px; align-self:center">
      <svg viewBox="0 0 100 100" width="590" height="590" style="display:block">
        <defs><linearGradient id="dusk5" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#F7E7CB"/><stop offset="1" stop-color="#EEC49E"/>
        </linearGradient></defs>
        <rect width="100" height="100" fill="url(#dusk5)"/>
        <circle cx="50" cy="53" r="15" fill="#FBF1DC"/>
        <rect y="63" width="100" height="37" fill="#AECBDD"/>
        <ellipse cx="50" cy="67" rx="12" ry="1.6" fill="#F4E3C4" opacity=".8"/>
        <ellipse cx="50" cy="72" rx="8" ry="1.2" fill="#F4E3C4" opacity=".55"/>
        <path d="M13 80 q4 -2.4 8 0 M76 84 q4 -2.4 8 0" stroke="#C6DBE8" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <path d="M27 22 q1.6 -1.8 3.2 -.1 q1.6 -1.7 3.2 0 M70 29 q1.4 -1.6 2.8 -.1" stroke="#3C464B" stroke-width=".9" fill="none" stroke-linecap="round" opacity=".65"/>
      </svg>
      <!-- play button -->
      <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center">
        <div style="width:116px;height:116px;border-radius:999px;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;padding-left:9px;box-shadow:0 7px 18px rgba(60,70,75,0.2)">
          <svg width="53" height="53" viewBox="0 0 24 24" fill="#3C464B"><path d="M7 4.5 L19.5 12 L7 19.5 Z"/></svg>
        </div>
      </div>
      <!-- volume button -->
      <div style="position:absolute; top:26px; right:26px; width:84px;height:84px;border-radius:999px;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#3C464B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9.5 H7.5 L12.5 5 V19 L7.5 14.5 H4 Z" fill="#3C464B" stroke="none"/><path d="M15.5 9 C 16.8 10.6, 16.8 13.4, 15.5 15 M18 6.8 C 20.4 9.6, 20.4 14.4, 18 17.2"/></svg>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="font-weight:600;font-size:33px">Golden Hour.m4a</div>
      <div style="font-size:29px;color:#595E5E">13s · saved to your feed</div>
    </div>

    <div class="btn primary">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#C9E3F5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 V15 M7 10.5 L12 15.5 L17 10.5 M5 19.5 H19"/></svg>
      Save to gallery
    </div>
    <div class="btn ghost">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#3C464B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="12" r="2.6"/><circle cx="17.5" cy="5.5" r="2.6"/><circle cx="17.5" cy="18.5" r="2.6"/><path d="M8.4 10.8 L15.2 6.7 M8.4 13.2 L15.2 17.3"/></svg>
      Share
    </div>
  </div></div>

</body></html>
