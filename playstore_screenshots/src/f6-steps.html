<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="fonts.css"><link rel="stylesheet" href="style.css">
<style>
  body { justify-content: center; }
  .stack { display: flex; flex-direction: column; align-items: center; position: relative; width: 800px; }
  .step {
    width: 100%; background: #FFFFFF; border-radius: 44px;
    box-shadow: 0 13px 31px rgba(60,70,75,0.14);
    display: flex; align-items: center; gap: 40px; padding: 40px 48px;
  }
  .stepnum {
    width: 104px; height: 104px; border-radius: 34px; background: #C9E3F5; flex: none;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bricolage'; font-weight: 600; font-size: 48px;
  }
  .steplabel { font-family: 'Nunito'; font-weight: 600; font-size: 42px; }
  .stepsub { font-size: 29px; color: #595E5E; margin-top: 4px; font-weight: 400; }
</style>
</head><body>

  <div class="stack">
    <h1 style="max-width:820px">Three taps.<br>One video.</h1>

    <div style="display:flex; flex-direction:column; gap:36px; width:100%; margin-top:96px">
      <div class="step">
        <div class="stepnum">1</div>
        <div><div class="steplabel">Pick a picture</div><div class="stepsub">Any picture in your gallery.</div></div>
      </div>
      <div class="step">
        <div class="stepnum">2</div>
        <div><div class="steplabel">Pick the song</div><div class="stepsub">MP3, M4A, WAV — whatever is on your phone.</div></div>
      </div>
      <div class="step">
        <div class="stepnum">3</div>
        <div><div class="steplabel">Choose the moment</div><div class="stepsub">Trim to the chorus, the beat drop, the hook.</div></div>
      </div>
    </div>

    <!-- the app's own FAB, with its hand-placed hint -->
    <div style="position:relative; margin-top:130px">
      <div style="width:150px;height:150px;border-radius:999px;background:#3C464B;display:flex;align-items:center;justify-content:center;box-shadow:0 16px 40px rgba(60,70,75,0.3)">
        <svg width="66" height="66" viewBox="0 0 24 24" fill="none" stroke="#C9E3F5" stroke-width="2.4" stroke-linecap="round"><path d="M12 5 V19 M5 12 H19"/></svg>
      </div>
      <div style="position:absolute; right:180px; top:-50px; text-align:left">
        <div style="font-family:'Bricolage'; font-weight:600; font-size:44px; transform:rotate(-7deg); white-space:nowrap">make one</div>
        <svg width="110" height="88" viewBox="0 0 30 24" style="margin-left:110px; margin-top:2px" fill="none" stroke="#3C464B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 2 C 6 11, 14 18, 25 20"/>
          <path d="M19 21.5 L25.5 20 L21.5 14.5"/>
        </svg>
      </div>
    </div>
  </div>

</body></html>
