<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="fonts.css"><link rel="stylesheet" href="style.css">
</head><body>

  <div class="top">
    <!-- hand-drawn picture frame -->
    <div class="doodle">
      <svg viewBox="0 0 120 120" fill="none" stroke="#3C464B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 22 C 50 18, 80 19, 102 21 C 105 50, 104 76, 102 99 C 70 102, 40 101, 19 99 C 16 72, 16 46, 18 22 Z"/>
        <circle cx="44" cy="47" r="9"/>
        <path d="M27 92 C 42 70, 54 62, 66 74 C 76 62, 88 64, 96 78"/>
      </svg>
    </div>
    <h1>Start with one picture</h1>
    <!-- sparkle -->
    <svg class="spark" style="right:-10px; top:210px" width="46" height="46" viewBox="0 0 40 40" fill="none" stroke="#3C464B" stroke-width="4" stroke-linecap="round">
      <path d="M20 4 C 21 12, 22 14, 20 20 C 19 26, 20 30, 20 36 M4 20 C 12 19, 14 18, 20 20 C 26 21, 30 20, 36 20"/>
    </svg>
  </div>

  <div class="phone"><div class="screen">
    <div class="nav">
      <div class="backbtn">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#3C464B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 L8 12 L15 19"/></svg>
      </div>
      <div class="meter"><i class="cur"></i><i></i><i></i></div>
    </div>
    <div>
      <div class="mtitle">Pick a picture</div>
      <div class="msub">Your video is built around one picture.</div>
    </div>

    <div class="card" style="width:590px; align-self:center">
      <svg viewBox="0 0 100 100" width="590" height="590" style="display:block">
        <defs><linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#F7E7CB"/><stop offset="1" stop-color="#EEC49E"/>
        </linearGradient></defs>
        <rect width="100" height="100" fill="url(#dusk)"/>
        <circle cx="50" cy="53" r="15" fill="#FBF1DC"/>
        <rect y="63" width="100" height="37" fill="#AECBDD"/>
        <ellipse cx="50" cy="67" rx="12" ry="1.6" fill="#F4E3C4" opacity=".8"/>
        <ellipse cx="50" cy="72" rx="8" ry="1.2" fill="#F4E3C4" opacity=".55"/>
        <path d="M13 80 q4 -2.4 8 0 M76 84 q4 -2.4 8 0" stroke="#C6DBE8" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <path d="M27 22 q1.6 -1.8 3.2 -.1 q1.6 -1.7 3.2 0 M70 29 q1.4 -1.6 2.8 -.1" stroke="#3C464B" stroke-width=".9" fill="none" stroke-linecap="round" opacity=".65"/>
      </svg>
    </div>

    <div class="btn ghost">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3C464B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="15" rx="3"/><circle cx="9" cy="10" r="1.7"/><path d="M5 18 L10.5 12.5 L14 16 L16.5 13.5 L20 17"/></svg>
      Swap picture
    </div>
    <div class="btn primary">Next: pick the song</div>
  </div></div>

</body></html>
